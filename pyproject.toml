[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "unified-algebra"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=9.0.3", "numpy", "scipy"]

[tool.hatch.build.targets.wheel]
packages = ["src/unified_algebra"]

[tool.hatch.metadata]
allow-direct-references = true

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = [
    "src",
    "../hydra/dist/python/hydra-kernel/src/main/python",
]
