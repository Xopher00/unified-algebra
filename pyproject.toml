[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "unified-algebra"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "hydra @ git+https://github.com/CategoricalData/hydra.git#subdirectory=heads/python",
]

[project.optional-dependencies]
dev = ["pytest>=9.0.3", "pytest-testmon", "numpy", "scipy", "hatchling", "psutil"]

[tool.hatch.build.targets.wheel]
packages = ["src/unialg", "src/hydra"]

[tool.hatch.build.hooks.custom]
path = "hatch_build.py"

[tool.hatch.metadata]
allow-direct-references = true

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src", "tests"]
