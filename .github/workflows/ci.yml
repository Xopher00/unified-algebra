name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Install Hydra
        run: |
          git clone https://github.com/CategoricalData/hydra hydra
          uv pip install -e hydra/heads/python/
      - run: uv run --python 3.12 pytest
